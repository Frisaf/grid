<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Grid</title>
</head>
<body>
    <h1>Explicit Grid</h1>
    <div class="gridContainer">
        <h2>Template Rows</h2>

        <div class="templateRows">
            <div class="box">
                <p>Hi</p>
            </div>
            <div class="box">
                <p>Hello</p>
            </div>
            <div class="box">
                <p>Hey</p>
            </div>
            <div class="box">
                <p>Howdy partner</p>
            </div>
        </div>

        <h2>Template Columns</h2>

        <div class="templateColumns">
            <div class="box">
                <p>Hi</p>
            </div>
            <div class="box">
                <p>Hello</p>
            </div>
            <div class="box">
                <p>Hey</p>
            </div>
            <div class="box">
                <p>Howdy partner</p>
            </div>
            </div>
        </div>
    </div>
</body>
</html>
