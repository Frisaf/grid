<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Grid</title>
</head>
<body>
    <h1>Magazine</h1>
    <div class="gridContainer">
        <div class="box heading">
            <p>Featured Article</p>
            <h2>Divinity: Original Sin 2</h2>
        </div>
        <div class="box content1">
            <h3>THE BEST TABLETOP MINUS THE TABLE</h3>
            <h4>BY FRASER BROWN</h4>
            <p>Lorem ipsum dolor sit amet.</p>
        </div>
        <div class="box content2">
            <p>Content 2</p>
        </div>
        <div class="box quote">
            <span>WE BOTH DIED. TWICE. BUT I STILL FELT REALLY GOOD ABOUT MY DECISION</span>
        </div>
        <div class="box image">
            <p>Image</p>
        </div>
        <div class="box score">
            <p>Score</p>
        </div>
    </div>
</body>
</html>
