<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Grid</title>
</head>
<body>
    <h1>Grid Gaps (Gutters)</h1>
    <div class="gridContainer">
        <div class="box">
            <p>Hi</p>
        </div>
        <div class="box">
            <p>Hello</p>
        </div>
        <div class="box">
            <p>Hey</p>
        </div>
        <div class="box">
            <p>Howdy partner, how are you doing this fine morning?</p>
        </div>
        <div class="box">
            <p>Hai</p>
        </div>
        <div class="box">
            <p>Good day</p>
        </div>
        <div class="box">
            <p>Good morning</p>
        </div>
        <div class="box">
            <p>Good afternoon</p>
        </div>
        <div class="box">
            <p>Good evening</p>
        </div>
        <div class="box">
            <p>Good night</p>
        </div>
    </div>
</body>
</html>
